security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # # Endpoint de refresh (doit être avant 'main')
        # refresh:
        #     pattern: ^/api/token/refresh
        #     stateless: true
        #     refresh_jwt:
        #         check_path: /api/token/refresh
        #         # Pas d'authentification requise pour le refresh
        #     # (le refresh token dans le cookie suffit)

        #Endpoint de login
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure


        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    #mettre que les pages , si je veux préciser utiliser is_granted dans les entités
    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        # accessible uniquement aux administrateurs.
        - { path: ^/api/users/me, roles: ROLE_USER }
        - { path: ^/api/users, roles: PUBLIC_ACCESS }

        # accessible lecture publique
        - { path: ^/api/movies, roles: PUBLIC_ACCESS, methods: ["GET"] }
        - { path: ^/api/genres, roles: PUBLIC_ACCESS, methods: ["GET"] }

        # accessible ecriture réservé aux administrateurs
        - {
              path: ^/api/movies,
              roles: ROLE_ADMIN,
              methods: ["POST", "PUT", "DELETE", "PATCH"],
          }
        - {
              path: ^/api/genres,
              roles: ROLE_ADMIN,
              methods: ["POST", "PUT", "DELETE", "PATCH"],
          }

        # accessible uniquement à l’utilisateur connecté.
        - { path: ^/api/favorites, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
