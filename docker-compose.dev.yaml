services:
  # ============================================
  # Service MySQL : Base de données
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: netflux_mysql_dev
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: netflux
      MYSQL_USER: netflux
      MYSQL_PASSWORD: netflux
    ports:
      - 3306:3306
    volumes:
      # Volume nommé pour persistance des données
      - mysql_dev_data:/var/lib/mysql
    networks:
      - netflux_network
    command: >
      --default-authentication-plugin=mysql_native_password
      --skip-name-resolve
    # Healthcheck : s'assure que MySQL est prêt avant de démarrer le backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-unetflux", "-pnetflux"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================
  # Service Backend : API Symfony + PHP-FPM
  # ============================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev  # Utilise le stage "dev" du Dockerfile
    container_name: netflux_backend_dev
    depends_on:
      mysql:
        condition: service_healthy  # Attend que MySQL soit prêt
    environment:
      # Connexion à MySQL via le nom de service "mysql"
      DATABASE_URL: mysql://netflux:netflux@mysql:3306/netflux?serverVersion=8.0
      APP_ENV: dev
      APP_DEBUG: 1
      XDEBUG_MODE: off  # Xdebug désactivé pour les performances
    volumes:
      # Monte le code source pour le hot-reload
      - ./backend:/app
      # IMPORTANT : Volumes nommés pour vendor/ et var/ (performances Windows)
      - backend_vendor:/app/vendor
      - backend_var:/app/var
    networks:
      - netflux_network

  # ============================================
  # Service Nginx : Proxy pour le backend
  # ============================================
  nginx_backend:
    image: nginx:alpine
    container_name: netflux_nginx_backend_dev
    depends_on:
      - backend
    ports:
      - "8080:80"  # Accessible sur http://localhost:8080
    volumes:
      # Dossier public de Symfony (assets)
      - ./backend/public:/app/public:ro
      # Configuration Nginx
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - netflux_network

  # ============================================
  # Service Frontend : Application Vue.js + Vite
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev  # Utilise le stage "dev" du Dockerfile
    container_name: netflux_frontend_dev
    ports:
      - "5173:5173"  # Accessible sur http://localhost:5173
    volumes:
      # Monte le code source pour le hot-reload
      - ./frontend:/app
      # IMPORTANT : Volume nommé pour node_modules/ (performances Windows)
      - frontend_node_modules:/app/node_modules
    networks:
      - netflux_network

# ============================================
# Volumes : Stockage persistant
# ============================================
volumes:
  mysql_dev_data:           # Données MySQL
  backend_vendor:           # Dépendances Composer (performance)
  backend_var:              # Cache Symfony (performance)
  frontend_node_modules:    # Dépendances npm (performance)

# ============================================
# Réseaux : Communication inter-conteneurs
# ============================================
networks:
  netflux_network:
    driver: bridge