server {
    listen 80;
    server_name localhost;
    root /app/public;

    # Timeouts augmentés pour éviter les erreurs 504
    fastcgi_read_timeout 60s;
    fastcgi_send_timeout 60s;

    # Redirection vers index.php pour toutes les routes
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Configuration PHP-FPM
    location ~ ^/index\.php(/|$) {
        # Proxy vers le service backend sur le port 9000
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        # Buffers pour améliorer les performances avec de grosses réponses
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 4k;
        fastcgi_busy_buffers_size 256k;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # internal : cette location n'est pas accessible directement
        internal;
    }

    # Bloquer l'accès direct aux autres fichiers PHP
    location ~ \.php$ {
        return 404;
    }
}